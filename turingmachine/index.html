<!doctype html>
<html>
    <head>
        <title>Turing Machine</title>

        <link rel=stylesheet href=texteditor.css>
        <link rel=stylesheet href=prism.css>

        <link rel=stylesheet href=style.css>

        <script src="prism.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/viz.js@2.1.2/viz.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/viz.js@2.1.2/full.render.js"></script>
    </head>

    <body>
        <header> </header>

        <main>
            <section class='editing'>
                <div class='texteditor'>
                    <pre><code class="texteditor-display"></code></pre>
                    <textarea class=texteditor-input># This is placeholder text explaining things

This is a basic text editor where u can write `markdown` markedup files, and those will be syntax highlighted for you,

For example *this is italics* and __this is bold__

The main reason we are allowing markdown is because we want to do literate programming, To add turing machine statements open a code block eg.

```
Initial A
A : a = B, b, Left
Final B
```

Here __A__ is the initial state, __B__ is the final state.

The syntax __A : a = B, b, Left__ indicates:
- System replaces __a__ with __b__
- Moves current tape head to the __Left__
- Change current state __A__ to __B__

Thats it ggs
_~Aanjishnu_
                    </textarea>
                </div>
            </section>

            <section>
                <section class='output'>
                    <nav>
                        <div data-who=transition-table id='output-table'>Transition Table</div>
                        <div data-who=transition-diagram id='output-transition' class='show'>Transition Diagram</div>
                    </nav>

                    <article class='transition-table' id='ttable'></article>
                    <article class='transition-diagram show' id='tdiagram'></article>

                </section>
                <section class='tape'>
                    <nav>
                        <div data-who=turingmachine-input class='show'>Machine Input</div>
                        <div data-who=turingmachine-tape>Machine Tape</div>
                    </nav>

                    <article class='turingmachine-input show'>
                        <textarea></textarea>
                    </article>

                    <article class='turingmachine-tape'>
                        <button id=turingmachine-step>Step</button>
                        <div class='long-tape' id='tlongtape'></div>
                        <pre class='status-info'>
                        </pre>
                    </article>
                </section>
            </section>
        </main>

        <footer>v0.0.1</footer>
        <script src="texteditor.js"></script>
        <script src="outputproc.js"></script>
        <script src="turingmachine.js"></script>
    </body>
</html>
